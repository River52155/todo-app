<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4年目标</title>
  <meta http-equiv="refresh" content="0; url=goals.html#4y" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: url("bg.png") no-repeat center center fixed;
      background-size: cover;
      color: #f7fafc;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.2);
      z-index: -1;
    }

    .redirect-card {
      width: min(520px, calc(100vw - 32px));
      padding: 24px;
      border-radius: 22px;
      background: rgba(30, 35, 50, 0.34);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.6rem;
    }

    p {
      margin: 0;
      color: #cbd5e0;
      line-height: 1.7;
    }

    a {
      color: #7dd3fc;
    }
  </style>
</head>
<body>
  <div class="redirect-card">
    <h1>正在跳转到 4 年目标</h1>
    <p>这个页面已经并入长期目标总页。如果没有自动跳转，请点击 <a href="goals.html#4y">这里</a>。</p>
  </div>
  <script>
    window.location.replace("goals.html#4y");
  </script>
</body>
</html>
