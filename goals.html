<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>长期规划总览</title>
  <link rel="stylesheet" href="styles/goals.css" />
  <link rel="stylesheet" href="styles/motion.css" />
</head>
<body>
  <div class="shell">
    <header class="page-header glass-panel" data-motion-stage style="--motion-order: 0;">
                  <nav class="page-nav">
        <a class="nav-link" href="index.html" data-hover-pop>每日计划</a>
        <a class="nav-link" href="recent.html" data-hover-pop>近期计划</a>
        <a class="nav-link active" href="goals.html#overview" data-shell-route="overview" data-hover-pop>长期目标</a>
        <a class="nav-link" href="expenses.html" data-hover-pop>消费记录</a>
      </nav>

      <div class="hero">
        <div class="hero-copy" data-hover-pop>
          <p class="eyebrow" id="shellEyebrow">Long-term planning</p>
          <h1 class="hero-title" id="shellHeroTitle">把日计划之外的目标，拉长到一年、三年和四年。</h1>
          <p class="hero-description" id="shellHeroDescription">
            这里不是替代你的每日任务，而是把更远的目标单独沉淀下来。你可以先写愿景，再拆成可追踪的里程碑，
            让长期目标也像日程一样有节奏地推进。
          </p>
          <div class="hero-highlight" id="shellHeroHighlight">📌 目标内容与每日任务分开保存，互不影响。</div>
          <div class="hero-stats">
            <div class="stat-card">
              <div class="stat-number" id="shellStatValue1">0</div>
              <div class="stat-label" id="shellStatLabel1">已设定目标页</div>
            </div>
            <div class="stat-card">
              <div class="stat-number" id="shellStatValue2">0</div>
              <div class="stat-label" id="shellStatLabel2">累计里程碑</div>
            </div>
            <div class="stat-card">
              <div class="stat-number" id="shellStatValue3">0%</div>
              <div class="stat-label" id="shellStatLabel3">平均推进度</div>
            </div>
          </div>
        </div>

        <div class="hero-visual" data-hover-pop>
          <div class="hero-visual-content" id="shellHeroVisualContent"></div>
        </div>
      </div>
    </header>

    <main class="page-content">
      <section class="route-bar glass-panel" data-motion-stage style="--motion-order: 1;">
        <div class="route-bar-copy">
          <p class="eyebrow route-eyebrow">Quick switch</p>
          <h2 id="routePanelTitle">目标总览</h2>
          <p id="routePanelDescription">在同一页面里切换总览和各阶段详情，不再重复加载整页。</p>
        </div>
        <nav class="goal-tabs" aria-label="长期目标视图">
          <a class="goal-tab active" href="goals.html#overview" data-shell-route="overview" data-hover-pop>总览</a>
          <a class="goal-tab" href="goals.html#1y" data-shell-route="1y" data-hover-pop>1年目标</a>
          <a class="goal-tab" href="goals.html#3y" data-shell-route="3y" data-hover-pop>3年目标</a>
          <a class="goal-tab" href="goals.html#4y" data-shell-route="4y" data-hover-pop>4年目标</a>
        </nav>
      </section>

      <div class="goals-view-host" id="goalsViewHost"></div>

      <p class="footer-note" id="pageFooterNote" data-motion-stage style="--motion-order: 2;">长期规划页使用本地浏览器存储；如果你换浏览器或清空缓存，数据也会一起清掉。</p>
    </main>
  </div>

  <script src="scripts/motion.js"></script>
  <script src="scripts/goals.js"></script>
</body>
</html>
